<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnePlus N6 - One Charge. Three Days. Zero Stress.</title>
    <meta name="description"
        content="OnePlus N6 product page. Recreated with high-fidelity, interactive tabs, and premium aesthetics.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <div class="brand-logo">Upcoming Project</div>
            <nav class="header-nav">
                <a href="#" class="nav-link">Home</a>
                <a href="#" class="nav-link active">Overview</a>
                <button class="btn-notify" id="notifyBtn">Contact Me</button>
            </nav>
        </div>
    </header>

    <!-- Main content removed as requested -->

    <!-- Bottom tabbed navigation bar -->
    <footer class="tab-navigation-bar">
        <div class="tabs-grid">
            <!-- Tab 1: Overview -->
            <button class="tab-btn" data-tab="overview" id="tab-overview">
                <div class="tab-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                </div>
                <span class="tab-label">Overview</span>
            </button>

            <!-- Tab 2: Design -->
            <button class="tab-btn" data-tab="design" id="tab-design">
                <div class="tab-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                        </path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                </div>
                <span class="tab-label">Design</span>
            </button>

            <!-- Tab 3: Battery (Active by default) -->
            <button class="tab-btn active" data-tab="battery" id="tab-battery">
                <div class="tab-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="1" y="6" width="18" height="12" rx="2" ry="2"></rect>
                        <line x1="23" y1="11" x2="23" y2="13"></line>
                        <polygon points="11 8 6 12 10 12 9 16 14 12 10 12 11 8"></polygon>
                    </svg>
                </div>
                <span class="tab-label">Battery</span>
            </button>

            <!-- Tab 4: Performance -->
            <button class="tab-btn" data-tab="performance" id="tab-performance">
                <div class="tab-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="4" y="4" width="16" height="16" rx="2"></rect>
                        <rect x="9" y="9" width="6" height="6"></rect>
                        <line x1="9" y1="1" x2="9" y2="4"></line>
                        <line x1="15" y1="1" x2="15" y2="4"></line>
                        <line x1="9" y1="20" x2="9" y2="23"></line>
                        <line x1="15" y1="20" x2="15" y2="23"></line>
                        <line x1="20" y1="9" x2="23" y2="9"></line>
                        <line x1="20" y1="15" x2="23" y2="15"></line>
                        <line x1="1" y1="9" x2="4" y2="9"></line>
                        <line x1="1" y1="15" x2="4" y2="15"></line>
                    </svg>
                </div>
                <span class="tab-label">Performance</span>
            </button>

            <!-- Tab 5: Smooth -->
            <button class="tab-btn" data-tab="smooth" id="tab-smooth">
                <div class="tab-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83">
                        </path>
                        <circle cx="12" cy="12" r="5"></circle>
                    </svg>
                </div>
                <span class="tab-label">Smooth</span>
            </button>

            <!-- Tab 6: Display -->
            <button class="tab-btn" data-tab="display" id="tab-display">
                <div class="tab-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                        <line x1="12" y1="18" x2="12" y2="18"></line>
                    </svg>
                </div>
                <span class="tab-label">Display</span>
            </button>

            <!-- Tab 7: Durability -->
            <button class="tab-btn" data-tab="durability" id="tab-durability">
                <div class="tab-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
                    </svg>
                </div>
                <span class="tab-label">Durability</span>
            </button>

            <!-- Tab 8: Imaging -->
            <button class="tab-btn" data-tab="imaging" id="tab-imaging">
                <div class="tab-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </div>
                <span class="tab-label">Imaging</span>
            </button>
        </div>
    </footer>

    <!-- Modal removed as requested -->

    <script src="script.js"></script>
</body>

</html>
